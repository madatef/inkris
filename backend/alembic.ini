[alembic]
# path to migration scripts.
script_location = %(here)s/alembic

# template used to generate migration file names;
# see https://alembic.sqlalchemy.org/en/latest/tutorial.html#editing-the-ini-file for all available tokens
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

prepend_sys_path = .



# version location specification. (May change)
version_locations = %(here)s/alembic/versions


path_separator = os





# Leave this dummy default as is. The actual database url is set in alembic/env.py
sqlalchemy.url = postgresql+asyncpg://user:password@localhost:5432/dummydb



[post_write_hooks]


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
